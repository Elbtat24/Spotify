<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تلفزيون الموسيقى - Spotify TV</title>
    <style>
        :root { --spotify-green: #1DB954; --bg-dark: #090909; --card-bg: #181818; }
        body {
            margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif;
            direction: rtl; color: white; background: var(--bg-dark); overflow: hidden;
        }

        /* شاشة تسجيل الدخول */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .login-btn {
            background: var(--spotify-green); color: black; font-size: 18px; font-weight: bold;
            padding: 15px 40px; border-radius: 30px; border: none; cursor: pointer;
            transition: 0.3s; margin-top: 20px;
        }
        .login-btn:hover { transform: scale(1.05); }

        /* واجهة التطبيق الأساسية */
        #app-container { display: none; width: 100%; height: 100%; }

        /* Sidebar */
        .sidebar {
            width: 350px; background: #000; border-left: 1px solid #222;
            display: flex; flex-direction: column; height: 100%; z-index: 10;
        }
        .search-box { padding: 20px; border-bottom: 1px solid #222; }
        input {
            width: 100%; padding: 12px; border-radius: 25px; border: none;
            background: #242424; color: white; outline: none; box-sizing: border-box;
            font-size: 14px;
        }
        input:focus { border: 1px solid var(--spotify-green); }

        .list-container { overflow-y: auto; flex: 1; padding: 10px; }
        h3 { color: var(--spotify-green); padding: 10px; margin: 0; font-size: 16px; border-bottom: 1px solid #111; }

        /* Track Card */
        .track-card {
            padding: 10px; margin: 8px 0; background: var(--card-bg); border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .track-card:hover { background: #282828; transform: scale(1.02); }
        .track-card.active { border-right: 4px solid var(--spotify-green); background: #282828; }
        .track-card img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; }
        .track-info .title { font-size: 14px; font-weight: bold; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info .artist { font-size: 12px; color: #b3b3b3; }

        .fav-btn { color: #444; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .fav-btn:hover { color: #ff5252; transform: scale(1.2); }
        .fav-btn.is-fav { color: var(--spotify-green); }

        /* Main TV Area */
        .main-tv {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; position: relative; 
            background: radial-gradient(circle at center, #1DB95422 0%, #000 100%);
        }

        #screen-display {
            width: 85%; max-width: 900px; height: 500px;
            background: #000; border-radius: 20px;
            box-shadow: 0 0 100px rgba(29, 185, 84, 0.15);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 5px solid #181818;
        }
        iframe { border: none; width: 100%; height: 100%; }
        
        #welcome-msg { text-align: center; }
        #welcome-msg h2 { color: var(--spotify-green); font-size: 32px; }
        .loading-spinner { color: var(--spotify-green); font-size: 14px; text-align: center; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="color: white; font-size: 40px;">Music <span style="color:#1DB954">TV</span></h1>
    <p style="color: #aaa;">يرجى تسجيل الدخول بحساب سبوتيفاي الخاص بك للبدء</p>
    <button class="login-btn" onclick="loginWithSpotify()">تسجيل الدخول باستخدام Spotify</button>
</div>

<div id="app-container">
    <div class="sidebar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="ابحث عن أغنية، فنان، أو ألبوم...">
            <div id="loader" class="loading-spinner">جاري البحث...</div>
        </div>
        
        <h3>⭐ المفضلات</h3>
        <div id="fav-list" class="list-container" style="flex: 0; min-height: 100px; max-height: 200px; border-bottom: 2px solid #222;"></div>
        
        <h3 id="list-title">🔝 أفضل الأغاني لك</h3>
        <div id="results-list" class="list-container"></div>
    </div>

    <div class="main-tv">
        <div id="screen-display">
            <div id="welcome-msg">
                <h2>Spotify TV</h2>
                <p>اختر أغنية من القائمة لبدء العرض الاستعراضي</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // إعدادات Spotify (تلقائية)
    // ==========================================
    const clientId = '95c72f37d3f0498799241f475870c429'; 
    const redirectUri = window.location.href.split('?')[0]; 

    // 1. نظام المصادقة PKCE
    function generateRandomString(length) {
        let text = '';
        let possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        for (let i = 0; i < length; i++) {
            text += possible.charAt(Math.floor(Math.random() * possible.length));
        }
        return text;
    }

    async function generateCodeChallenge(codeVerifier) {
        const data = new TextEncoder().encode(codeVerifier);
        const digest = await window.crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode.apply(null, [...new Uint8Array(digest)]))
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=+$/, '');
    }

    async function loginWithSpotify() {
        const verifier = generateRandomString(128);
        localStorage.setItem('code_verifier', verifier);
        const challenge = await generateCodeChallenge(verifier);

        const params = new URLSearchParams({
            client_id: clientId,
            response_type: 'code',
            redirect_uri: redirectUri,
            scope: 'user-top-read user-read-private',
            code_challenge_method: 'S256',
            code_challenge: challenge
        });

        window.location = `https://accounts.spotify.com/authorize?${params.toString()}`;
    }

    async function exchangeToken(code) {
        let verifier = localStorage.getItem('code_verifier');
        const params = new URLSearchParams({
            client_id: clientId,
            grant_type: 'authorization_code',
            code: code,
            redirect_uri: redirectUri,
            code_verifier: verifier
        });

        const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });

        const data = await response.json();
        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('refresh_token', data.refresh_token);
        
        window.history.pushState({}, document.title, redirectUri);
        startApp();
    }

    async function refreshAccessToken() {
        const refreshToken = localStorage.getItem('refresh_token');
        const params = new URLSearchParams({
            client_id: clientId,
            grant_type: 'refresh_token',
            refresh_token: refreshToken
        });

        const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        });

        const data = await response.json();
        if(data.access_token) {
            localStorage.setItem('access_token', data.access_token);
            if(data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
            return data.access_token;
        } else {
            localStorage.clear();
            window.location.reload();
        }
    }

    // 2. دوال التعامل مع API
    async function fetchWebApi(endpoint, method = 'GET') {
        let accessToken = localStorage.getItem('access_token');
        
        let res = await fetch(`https://api.spotify.com/v1/${endpoint}`, {
            headers: { Authorization: `Bearer ${accessToken}` },
            method
        });

        if (res.status === 401) {
            accessToken = await refreshAccessToken();
            res = await fetch(`https://api.spotify.com/v1/${endpoint}`, {
                headers: { Authorization: `Bearer ${accessToken}` },
                method
            });
        }
        return await res.json();
    }

    // 3. منطق التطبيق
    let favorites = JSON.parse(localStorage.getItem('music_favs')) || [];
    let currentTrackId = null;

    const searchInput = document.getElementById('search-input');
    const resultsList = document.getElementById('results-list');
    const favList = document.getElementById('fav-list');
    const screenDisplay = document.getElementById('screen-display');

    async function loadTopTracks() {
        const data = await fetchWebApi('me/top/tracks?time_range=long_term&limit=15');
        if (data.items) renderTracks(data.items, resultsList);
    }

    searchInput.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (!query) return;

            document.getElementById('loader').style.display = "block";
            document.getElementById('list-title').innerText = `🔍 نتائج البحث عن: ${query}`;
            
            const data = await fetchWebApi(`search?q=${encodeURIComponent(query)}&type=track&limit=20`);
            document.getElementById('loader').style.display = "none";
            
            if (data.tracks) renderTracks(data.tracks.items, resultsList);
        }
    });

    function renderTracks(tracks, container) {
        container.innerHTML = "";
        tracks.forEach(track => {
            const trackData = {
                id: track.id,
                name: track.name,
                artist: track.artists.map(a => a.name).join(', '),
                img: track.album.images[0]?.url || 'https://via.placeholder.com/150'
            };

            const isFav = favorites.some(f => f.id === trackData.id);
            const card = document.createElement("div");
            card.className = `track-card ${currentTrackId === trackData.id ? 'active' : ''}`;
            card.onclick = () => playTrack(trackData.id);
            
            card.innerHTML = `
                <img src="${trackData.img}">
                <div class="track-info">
                    <span class="title">${trackData.name}</span>
                    <span class="artist">${trackData.artist}</span>
                </div>
                <div class="fav-btn ${isFav ? 'is-fav' : ''}" 
                     onclick="toggleFav(event, ${JSON.stringify(trackData).replace(/"/g, '&quot;')})">♥</div>
            `;
            container.appendChild(card);
        });
    }

    function playTrack(id) {
        currentTrackId = id;
        document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
        screenDisplay.innerHTML = `<iframe src="https://open.spotify.com/embed/track/${id}" allow="encrypted-media"></iframe>`;
    }

    function toggleFav(event, trackData) {
        event.stopPropagation();
        const index = favorites.findIndex(f => f.id === trackData.id);
        
        if (index > -1) favorites.splice(index, 1);
        else favorites.push(trackData);
        
        localStorage.setItem('music_favs', JSON.stringify(favorites));
        renderFavs();
        event.target.classList.toggle('is-fav');
    }

    function renderFavs() {
        favList.innerHTML = "";
        if (favorites.length === 0) {
            favList.innerHTML = "<p style='text-align:center;color:#555;font-size:12px;'>لا توجد مفضلات</p>";
            return;
        }
        favorites.forEach(track => {
            const card = document.createElement("div");
            card.className = "track-card";
            card.style.background = "#121212";
            card.onclick = () => playTrack(track.id);
            card.innerHTML = `
                <img src="${track.img}" style="width:40px;height:40px">
                <div class="track-info">
                    <span class="title" style="font-size:12px;">${track.name}</span>
                </div>
                <div class="fav-btn is-fav" onclick="toggleFav(event, ${JSON.stringify(track).replace(/"/g, '&quot;')})">♥</div>
            `;
            favList.appendChild(card);
        });
    }

    function startApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
        renderFavs();
        loadTopTracks();
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        let code = urlParams.get('code');
        
        if (code) {
            exchangeToken(code);
        } else if (localStorage.getItem('access_token')) {
            startApp();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    };
</script>
</body>
</html>
